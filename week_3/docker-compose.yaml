services:
  # --- Frontend Service Configuration ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend
    pull_policy: build
    ports:
      - "80:8000"  
    environment:
      - BACKEND_URL=http://localhost:8001/chat  
    restart: always

  # --- Backend Service Configuration ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend
    pull_policy: build
    ports:
      - "8001:8000"  
    env_file:
      - ./.env
    # 🔍 --- ADD THIS VOLUMES BLOCK RIGHT HERE ---
    volumes:
      - ./backend/src:/app/src   # Syncs your python source code folder
      - ./backend/src/week_2/data:/app/data # 🧠 CRITICAL: Syncs your SQLite data directory file layout!
    restart: always