<!doctype html><html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resume Helper Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
      body {
        background-color: #ffffff;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .chat-wrapper {
        max-width: 900px;
        width: 100%;
        height: 90vh;
      }
      /* Chat history container with soft off-white background matching the image */
      .chat-history {
        height: 70vh;
        overflow-y: auto;
        background-color: #f6f6f6;
        border-radius: 12px;
        padding: 1.5rem;
        border: 1px solid #e5e5e5;
      }
      /* Highly rounded modern message bubbles */
      .message-bubble {
        max-width: 75%;
        padding: 0.75rem 1.25rem;
        border-radius: 16px;
        margin-bottom: 1rem;
        font-size: 0.95rem;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }
      /* Left aligned assistant bubble (White with border) */
      .message-assistant {
        background-color: #ffffff;
        color: #212529;
        border: 1px solid #e1e1e1;
      }
      /* Right aligned user bubble (Purple matching the image) */
      .message-user {
        background-color: #5850bc;
        color: #ffffff;
      }
      /* Sleek, unified bottom input container */
      .input-area {
        background-color: #ffffff;
        border: 1px solid #dcdcdc;
        border-radius: 12px;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .input-area input[type="text"] {
        border: none;
        outline: none;
        box-shadow: none;
        font-size: 0.95rem;
      }
      .input-area input[type="text"]:focus {
        border: none;
        outline: none;
        box-shadow: none;
      }
      /* Matching design system buttons */
      .btn-upload {
        color: #6c757d;
        background-color: transparent;
        border: 1px solid #dcdcdc;
        border-radius: 8px;
        padding: 0.375rem 0.75rem;
        transition: all 0.2s ease;
      }
      .btn-upload:hover {
        background-color: #f0f0f0;
      }
      .btn-send {
        background-color: #5850bc;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.5rem;
        font-weight: 500;
        transition: background-color 0.2s ease;
      }
      .btn-send:hover {
        background-color: #463f9a;
        color: #ffffff;
      }
      .system-notice {
        font-size: 0.8rem;
        color: #8c8c8c;
        text-align: center;
        margin-bottom: 0.5rem;
      }
      /* Hidden native file input */
      #pdfFile {
        display: none;
      }
      /* Indicator badge for attached file */
      .file-badge {
        font-size: 0.8rem;
        background-color: #e8e7f7;
        color: #5850bc;
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        display: none;
        align-items: center;
        gap: 0.25rem;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center">

    <div class="chat-wrapper d-flex flex-column justify-content-between p-3">
      
      <div class="chat-history d-flex flex-column flex-grow-1 mb-3" id="chatHistory">
        <div class="d-flex justify-content-start">
          <div class="message-bubble message-assistant">
            Hi! How can I help you today?
          </div>
        </div>
      </div>

      <div>
        <div class="mb-2 d-flex justify-content-start">
          <div class="file-badge" id="fileBadge">
            <i class="bi bi-file-earmark-pdf-fill"></i> <span id="fileNameSpan">resume.pdf</span>
            <i class="bi bi-x-circle-fill ms-1 style-pointer" style="cursor:pointer;" id="removeFileBtn"></i>
          </div>
        </div>

        <form id="chatForm" onsubmit="event.preventDefault();" class="input-area">
          <input type="file" id="pdfFile" accept=".pdf">
          <button class="btn btn-upload" type="button" id="uploadTriggerBtn" title="Upload Resume (.pdf)">
            <i class="bi bi-upload"></i>
          </button>
          
          <input type="text" id="userInput" class="form-control" placeholder="Type a message..." autocomplete="off" required>
          
          <button class="btn btn-send" type="button" id="sendBtn">Send</button>
        </form>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      // Capture Environment Variable Injected from FastAPI context
      const BACKEND_URL = "{{ BACKEND_URL }}";

      // Element Access Variables
      const chatHistory = document.getElementById('chatHistory');
      const userInput = document.getElementById('userInput');
      const pdfFileInput = document.getElementById('pdfFile');
      const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
      const fileBadge = document.getElementById('fileBadge');
      const fileNameSpan = document.getElementById('fileNameSpan');
      const removeFileBtn = document.getElementById('removeFileBtn');
      const sendBtn = document.getElementById('sendBtn');

      // Sync custom UI upload button directly to hidden file input event
      uploadTriggerBtn.addEventListener('click', () => pdfFileInput.click());

      // File Selection State management
      pdfFileInput.addEventListener('change', () => {
        if (pdfFileInput.files.length > 0) {
          fileNameSpan.textContent = pdfFileInput.files[0].name;
          fileBadge.style.display = 'inline-flex';
        }
      });

      // Clear File choice handling safely
      removeFileBtn.addEventListener('click', () => {
        pdfFileInput.value = "";
        fileBadge.style.display = 'none';
      });

      function scrollToBottom() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      function appendMessage(text, isUser = false, isNotice = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `d-flex ${isUser ? 'justify-content-end' : 'justify-content-start'}`;
        
        if (isNotice) {
          const noticeDiv = document.createElement('div');
          noticeDiv.className = "system-notice w-100";
          noticeDiv.textContent = text;
          wrapper.appendChild(noticeDiv);
        } else {
          const bubble = document.createElement('div');
          bubble.className = `message-bubble ${isUser ? 'message-user' : 'message-assistant'}`;
          bubble.textContent = text;
          wrapper.appendChild(bubble);
        }
        
        chatHistory.appendChild(wrapper);
        scrollToBottom();
      }

      async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          const pageText = textContent.items.map(item => item.str).join(" ");
          fullText += pageText + "\n";
        }
        return fullText.trim();
      }

      // Asynchronous Payload Submission Engine
      async function handleSubmission() {
        const messageText = userInput.value.trim();
        if (!messageText) return;

        const file = pdfFileInput.files[0];
        let extractedPdfText = "";

        // UI Interaction Updates
        appendMessage(messageText, true);
        userInput.value = ""; 

        if (file) {
          appendMessage(`Processing ${file.name}...`, false, true);
          try {
            extractedPdfText = await extractTextFromPDF(file);
          } catch (error) {
            console.error("PDF Parsing Failure:", error);
            appendMessage("⚠️ Failed to parse text content from this PDF.", false, true);
          }
          // Clear active file selections upon sending
          pdfFileInput.value = "";
          fileBadge.style.display = 'none';
        }

        const payload = {
          message: messageText,
          pdf_text: extractedPdfText
        };

        try {
          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          appendMessage(data.reply || "Message received successfully.");

        } catch (error) {
          console.warn("Falling back to expected mock handling strategy:", error);
          
          // Network Mock response emulation delay (1 second)
          setTimeout(() => {
            appendMessage("(Mocked Response) Got it! I received your message and extracted text from your PDF. The actual backend response will be implemented tomorrow.", false);
          }, 1000);
        }
      }

      sendBtn.addEventListener('click', handleSubmission);
      userInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          handleSubmission();
        }
      });
    </script>
  </body>
</html>
